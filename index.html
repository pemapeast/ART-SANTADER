 <!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ART Consultores — Astur Rural Tech</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --verde:    #1a4d2e;
      --verde-md: #2d7a4f;
      --verde-lt: #e8f5ee;
      --azul:     #0d5c8f;
      --azul-lt:  #e8f3fb;
      --azul-vib: #1a8fdb;
      --blanco:   #ffffff;
      --gris-bg:  #f7f8fa;
      --gris-lt:  #e5e8ed;
      --gris-txt: #6b7280;
      --negro:    #0f1923;
      --sombra:   0 4px 24px rgba(0,0,0,.08);
      --sombra-lg:0 12px 48px rgba(0,0,0,.14);
      --radio:    14px;
      --radio-lg: 22px;
      --trans:    .25s cubic-bezier(.4,0,.2,1);
    }

    html { scroll-behavior: smooth; }
    body { font-family: 'Inter', sans-serif; background: var(--blanco); color: var(--negro); overflow-x: hidden; }

    /* ─── SCROLLBAR ─── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--gris-bg); }
    ::-webkit-scrollbar-thumb { background: var(--verde-md); border-radius: 99px; }

    /* ─── NAV ─── */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 5%;
      height: 68px;
      background: rgba(255,255,255,.72);
      backdrop-filter: blur(18px) saturate(160%);
      -webkit-backdrop-filter: blur(18px) saturate(160%);
      border-bottom: 1px solid rgba(255,255,255,.35);
      transition: box-shadow var(--trans);
    }
    nav.scrolled { box-shadow: 0 2px 20px rgba(0,0,0,.10); }

    .nav-logo {
      display: flex; align-items: center; gap: 10px; text-decoration: none;
    }
    .nav-logo-mark {
      width: 36px; height: 36px;
      display: flex; align-items: center; justify-content: center;
    }
    .nav-logo-text { font-size: 16px; font-weight: 700; color: var(--negro); letter-spacing: -.3px; }
    .nav-logo-text span { color: var(--verde-md); }
